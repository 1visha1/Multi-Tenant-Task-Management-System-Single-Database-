name: Deploy Spring Boot to AWS EC2

on:
push:
branches: [ "main" ]

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up JDK
    uses: actions/setup-java@v4
    with:
      java-version: '17'

  - name: Build project
    run: mvn clean package -DskipTests

  - name: Build Docker image
    run: docker build -t management-app .

  - name: Save Docker image
    run: docker save management-app > app.tar

  - name: Copy image to EC2
    uses: appleboy/scp-action@v0.1.7
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_KEY }}
      source: "app.tar"
      target: "/home/ubuntu"

  - name: Deploy on EC2
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.EC2_HOST }}
      username: ${{ secrets.EC2_USER }}
      key: ${{ secrets.EC2_KEY }}
      script: |
        docker load < app.tar
        docker stop app || true
        docker rm app || true
        docker run -d -p 8080:8080 --name app management-app
```
